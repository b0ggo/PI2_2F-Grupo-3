<!DOCTYPE html>
<html>

<head>
    <title>Vacinação</title>
    <link rel="stylesheet" href="vacinacao.css">
</head>

<body>

    <div class="container">
        <h1>Vacinação</h1>

        <form>
            <label for="animal">Animal/lote</label>
            <input type="text" id="animal" name="animal" placeholder="Digite o nome do animal" required>

            <label for="opcoes">Tipos de Vacina</label>
            <select name="opcoes" id="opcoes">
                <option value="aftosa">Febre Aftosa</option>
                <option value="brucelose">Brucelose</option>
                <option value="raiva">Raiva</option>
                <option value="peste_suina">Peste Suína</option>
                <option value="newcastle">Newcastle (aves)</option>
                <option value="gumboro">Gumboro (aves)</option>
            </select>

            <div class="animal">
                <div>
                    <label for="data_aplicacao">Data de aplicação</label>
                    <input type="date" id="data_aplicacao" name="data_aplicacao">
                </div>

                <div>
                    <label for="data_vencimento">Data de vencimento</label>
                    <input type="date" id="data_vencimento" name="data_vencimento">
                </div>
            </div>

            <label for="observacoes">Observações</label>
            <textarea id="observacoes" name="observacoes" placeholder="Digite aqui suas observações..."></textarea>

            <input type="submit" value="Registrar Vacina">
        </form>
    </div>

</body>
</html>
