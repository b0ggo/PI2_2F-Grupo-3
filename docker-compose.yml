services:
  db:
    image: postgres:16-alpine
    container_name: agrogestor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrogestor
      POSTGRES_PASSWORD: agrogestor
      POSTGRES_DB: agrogestor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrogestor -d agrogestor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrogestor-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg2://agrogestor:agrogestor@db:5432/agrogestor
      SECRET_KEY: agrogestor-dev-key
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FLASK_DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./vite-project
      dockerfile: Dockerfile.dev
    container_name: agrogestor-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./vite-project:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  frontend_node_modules:
