version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: agrogestor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrogestor
      POSTGRES_PASSWORD: agrogestor
      POSTGRES_DB: agrogestor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrogestor -d agrogestor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrogestor-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg2://agrogestor:agrogestor@db:5432/agrogestor
      SECRET_KEY: agrogestor-dev-key
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./vite-project
      dockerfile: Dockerfile
    container_name: agrogestor-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./vite-project:/app

volumes:
  pgdata:
